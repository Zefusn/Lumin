<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <main class="app">
        <section class="hero glass">
          <div class="hero-copy">
            <p class="eyebrow">Bing Daily Wallpaper</p>
            <h1>Lumin</h1>
            <p class="subtitle">
              每天获取 Bing 壁纸，生成更通透的毛玻璃版本，并一键同步到 Windows 桌面与锁屏。
            </p>

            <div class="actions">
              <button id="refreshButton" class="primary">获取今日壁纸</button>
              <button id="applyButton" class="secondary">应用到桌面与锁屏</button>
            </div>

            <label class="toggle-card">
              <span class="toggle-copy">
                <strong>开机自启</strong>
                <small>启动 Windows 时自动打开 Lumin，并检查当天壁纸。</small>
              </span>
              <span class="switch">
                <input id="autoStartToggle" type="checkbox" />
                <span class="switch-ui"></span>
              </span>
            </label>

            <div class="mini-actions">
              <button id="openCacheButton" class="ghost">打开缓存目录</button>
              <button id="openSourceButton" class="ghost">查看原图来源</button>
            </div>
          </div>

          <div class="preview-card">
            <div class="preview-frame">
              <img id="previewImage" alt="壁纸预览" />
              <div class="preview-shade"></div>
              <div class="preview-overlay glass">
                <p id="wallpaperDate" class="preview-date">等待获取今日壁纸</p>
                <h2 id="wallpaperTitle">Bing 每日壁纸</h2>
                <p id="wallpaperCopyright" class="preview-meta">
                  生成后会显示版权信息与更新时间
                </p>
              </div>
            </div>
          </div>
        </section>

        <section class="info-grid">
          <article class="info-card glass status-card">
            <p class="panel-label">当前状态</p>
            <p id="statusMessage" class="status-message">应用初始化中...</p>
          </article>

          <article class="info-card glass compact">
            <p class="panel-label">系统环境</p>
            <p id="windowsLabel" class="status-message">正在读取 Windows 版本</p>
          </article>

          <article class="info-card glass compact">
            <p class="panel-label">效果说明</p>
            <p class="status-message">
              参考轻玻璃界面的层次感，提升模糊强度，同时保留颜色和结构。
            </p>
          </article>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
